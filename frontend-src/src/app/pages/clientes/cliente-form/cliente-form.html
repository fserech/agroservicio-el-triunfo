<div class="p-4 max-w-3xl mx-auto">
      <div class="card">
        <div class="flex items-center justify-between px-5 py-3.5 border-b border-slate-100">
          <h2 class="font-display font-bold text-slate-800">{{ isEdit ? 'Editar Cliente' : 'Nuevo Cliente' }}</h2>
          <a routerLink="/clientes" class="btn-secondary">← Regresar</a>
        </div>
        <div class="p-5 space-y-5">
          <!-- Datos Generales -->
          <section>
            <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-400 pb-2 border-b border-slate-100 mb-4">Datos Generales</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div class="md:col-span-2">
                <label class="block text-xs font-semibold text-slate-600 mb-1">Nombre *</label>
                <input class="form-input" [(ngModel)]="form.nombre" placeholder="Nombre completo o razón social">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Tipo</label>
                <select class="form-select" [(ngModel)]="form.tipo">
                  <option value="individual">Individual</option>
                  <option value="empresa">Empresa</option>
                  <option value="cooperativa">Cooperativa</option>
                  <option value="finca">Finca</option>
                  <option value="otro">Otro</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">NIT</label>
                <input class="form-input" [(ngModel)]="form.nit" placeholder="0000000-0">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Teléfono</label>
                <input class="form-input" [(ngModel)]="form.telefono" placeholder="0000-0000">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Email</label>
                <input class="form-input" type="email" [(ngModel)]="form.email" placeholder="correo@ejemplo.com">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Municipio</label>
                <input class="form-input" [(ngModel)]="form.municipio" placeholder="Municipio">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1">Departamento</label>
                <input class="form-input" [(ngModel)]="form.departamento" placeholder="Departamento">
              </div>
              <div class="md:col-span-2">
                <label class="block text-xs font-semibold text-slate-600 mb-1">Dirección</label>
                <input class="form-input" [(ngModel)]="form.direccion" placeholder="Dirección completa">
              </div>
            </div>
          </section>
          <!-- Notas y estado -->
            <section>
              <div class="grid grid-cols-1 gap-3">
                <div>
                  <label class="block text-xs font-semibold text-slate-600 mb-1">Notas</label>
                  <textarea class="form-input h-auto min-h-[64px] py-2" [(ngModel)]="form.notas" rows="3"></textarea>
                </div>
                <div class="flex items-center gap-2">
                  <input type="checkbox" id="activo" [(ngModel)]="form.activo" class="w-4 h-4 accent-primary">
                  <label for="activo" class="text-xs font-medium text-slate-600 cursor-pointer">Cliente activo</label>
                </div>
              </div>
            </section>
          <!-- Actions -->
          <div class="flex justify-end gap-2 pt-2 border-t border-slate-100">
            <a routerLink="/clientes" class="btn-secondary">Cancelar</a>
            <button class="btn-primary h-9 px-5" (click)="save()" [disabled]="saving()">
              @if (saving()) { <span class="inline-block w-3.5 h-3.5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> }
              {{ isEdit ? 'Actualizar' : 'Crear Cliente' }}
            </button>
          </div>
        </div>
      </div>
    </div>
