@if (visible) {
      <div class="fixed inset-0 bg-black/40 z-[1000] flex items-center justify-center p-4" (click)="cancel()">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6" (click)="$event.stopPropagation()">
          <div class="text-4xl text-center mb-3">{{ icon }}</div>
          <h3 class="text-center font-display font-bold text-slate-800 text-base mb-1">{{ title }}</h3>
          <p class="text-center text-xs text-slate-500 mb-5">{{ message }}</p>
          <div class="flex gap-3">
            <button class="btn-secondary flex-1 justify-center" (click)="cancel()">Cancelar</button>
            <button class="btn-primary flex-1 justify-center" [class]="confirmClass" (click)="confirm()">{{ confirmLabel }}</button>
          </div>
        </div>
      </div>
    }
