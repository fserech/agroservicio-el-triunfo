<div class="fixed top-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none">
      @for (toast of toastService.toasts(); track toast.id) {
        <div class="toast-enter pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg text-white text-xs font-medium max-w-xs"
          [ngClass]="{
            'bg-emerald-600': toast.type === 'success',
            'bg-red-600': toast.type === 'error',
            'bg-blue-600': toast.type === 'info',
            'bg-amber-500': toast.type === 'warning'
          }">
          <span>{{ toast.type === 'success' ? '✓' : toast.type === 'error' ? '✕' : toast.type === 'warning' ? '⚠' : 'ℹ' }}</span>
          <span>{{ toast.message }}</span>
          <button class="ml-auto opacity-70 hover:opacity-100" (click)="toastService.dismiss(toast.id)">✕</button>
        </div>
      }
    </div>
