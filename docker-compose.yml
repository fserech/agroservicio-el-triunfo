services:
  postgres:
    image: postgres:15-alpine
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       agroservicio
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Agro$erv!c!o2026#Db}
    # Ajustes de PostgreSQL para mejor rendimiento
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=16MB
        -c maintenance_work_mem=64MB
        -c max_connections=100
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c log_min_duration_statement=2000
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agroservicio"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT:               3000
      NODE_ENV:           production
      DB_HOST:            postgres
      DB_PORT:            5432
      DB_NAME:            agroservicio
      DB_USER:            postgres
      DB_PASSWORD:        ${DB_PASSWORD:-Agro$erv!c!o2026#Db}
      JWT_SECRET:         ${JWT_SECRET:-c4mBi4EstoEnPr0ducci0n!UsaUnSecreto64CaracteresAleatorio2026}
      JWT_EXPIRES:        8h
      ALLOWED_ORIGINS:    http://localhost:8080
      # Pool settings
      DB_POOL_MAX:        20
      DB_POOL_MIN:        2
      DB_IDLE_TIMEOUT:    30000
      DB_CONNECT_TIMEOUT: 5000
      DB_STATEMENT_TIMEOUT: 30000
    networks:
      - crm_net
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_seed
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     agroservicio
      DB_USER:     postgres
      DB_PASSWORD: ${DB_PASSWORD:-Agro$erv!c!o2026#Db}
    command: node src/db/seed.js
    networks:
      - crm_net
    restart: "no"

  nginx:
    image: nginx:alpine
    container_name: crm_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - crm_net
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data:

networks:
  crm_net:
    driver: bridge
