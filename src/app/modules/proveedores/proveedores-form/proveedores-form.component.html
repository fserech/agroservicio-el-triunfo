<!-- proveedores-form.component.html -->
<app-header [headerTitle]="isEdit ? 'Editar Proveedor' : 'Nuevo Proveedor'"
  headerDescription="Registra o actualiza la información del proveedor.">
</app-header>

<div class="p-2 m-2">
  <div class="card max-w-3xl mx-auto bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl shadow-sm">
    <div class="card-header flex items-center justify-between px-5 py-4 border-b border-gray-200 dark:border-slate-700">
      <span class="card-title text-gray-800 dark:text-gray-100 font-semibold text-lg">{{ isEdit ? 'Editar Proveedor' : 'Datos del Proveedor' }}</span>
      <button class="btn btn-outline btn-sm flex items-center gap-1 text-gray-600 dark:text-gray-300 border border-gray-300 dark:border-slate-600 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-lg px-3 py-1.5 text-sm transition-colors" (click)="cancel()">
        <ng-icon name="matArrowBackOutline" size="16"></ng-icon> Volver
      </button>
    </div>
    <div class="card-body p-5">
      @if (form) {
        <form [formGroup]="form" (ngSubmit)="save()">

          <h3 class="section-title text-sm font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-3 mt-1">Información General</h3>
          <div class="form-grid-2 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="form-group form-full md:col-span-2 flex flex-col gap-1">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Nombre comercial *</label>
              <input formControlName="nombre" type="text" placeholder="Nombre del proveedor"
                class="rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-200 placeholder-gray-400 dark:placeholder-slate-500 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 dark:focus:ring-blue-500 transition-colors">
              @if (f['nombre'].invalid && f['nombre'].touched) {
                <span class="text-xs text-red-500 dark:text-red-400">Nombre es requerido</span>
              }
            </div>
            <div class="form-group form-full md:col-span-2 flex flex-col gap-1">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Razón social</label>
              <input formControlName="razon_social" type="text" placeholder="Nombre legal completo"
                class="rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-200 placeholder-gray-400 dark:placeholder-slate-500 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 dark:focus:ring-blue-500 transition-colors">
            </div>
            <div class="form-group flex flex-col gap-1">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">NIT</label>
              <input formControlName="nit" type="text" placeholder="0000000-0"
                class="rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-200 placeholder-gray-400 dark:placeholder-slate-500 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 dark:focus:ring-blue-500 transition-colors">
            </div>
            <div class="form-group flex flex-col gap-1">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Categoría de productos</label>
              <select formControlName="categoria"
                class="rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 dark:focus:ring-blue-500 transition-colors">
                <option value=""              class="bg-white dark:bg-slate-800">Seleccionar...</option>
                <option value="Fertilizantes" class="bg-white dark:bg-slate-800">Fertilizantes</option>
                <option value="Plaguicidas"   class="bg-white dark:bg-slate-800">Plaguicidas</option>
                <option value="Semillas"      class="bg-white dark:bg-slate-800">Semillas</option>
                <option value="Herramientas"  class="bg-white dark:bg-slate-800">Herramientas</option>
                <option value="Equipos"       class="bg-white dark:bg-slate-800">Equipos</option>
                <option value="Veterinaria"   class="bg-white dark:bg-slate-800">Veterinaria</option>
                <option value="Agroquímicos"  class="bg-white dark:bg-slate-800">Agroquímicos</option>
                <option value="General"       class="bg-white dark:bg-slate-800">General</option>
              </select>
            </div>
          </div>

          <h3 class="section-title text-sm font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-3 mt-6">Contacto</h3>
          <div class="form-grid-2 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="form-group form-full md:col-span-2 flex flex-col gap-1">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Persona de contacto</label>
              <input formControlName="contacto" type="text" placeholder="Nombre del representante"
                class="rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-200 placeholder-gray-400 dark:placeholder-slate-500 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 dark:focus:ring-blue-500 transition-colors">
            </div>
            <div class="form-group flex flex-col gap-1">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Teléfono</label>
              <input formControlName="telefono" type="tel" placeholder="0000-0000"
                class="rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-200 placeholder-gray-400 dark:placeholder-slate-500 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 dark:focus:ring-blue-500 transition-colors">
            </div>
            <div class="form-group flex flex-col gap-1">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Correo electrónico</label>
              <input formControlName="email" type="email" placeholder="correo@proveedor.com"
                class="rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-200 placeholder-gray-400 dark:placeholder-slate-500 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 dark:focus:ring-blue-500 transition-colors">
            </div>
            <div class="form-group form-full md:col-span-2 flex flex-col gap-1">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Dirección</label>
              <input formControlName="direccion" type="text" placeholder="Dirección completa"
                class="rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-200 placeholder-gray-400 dark:placeholder-slate-500 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 dark:focus:ring-blue-500 transition-colors">
            </div>
            <div class="form-group flex flex-col gap-1">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Departamento</label>
              <select formControlName="departamento"
                class="rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 dark:focus:ring-blue-500 transition-colors">
                <option value="" class="bg-white dark:bg-slate-800">Seleccionar...</option>
                @for (d of departamentos; track d) { <option [value]="d" class="bg-white dark:bg-slate-800">{{ d }}</option> }
              </select>
            </div>
          </div>

          <h3 class="section-title text-sm font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-3 mt-6">Condiciones Comerciales</h3>
          <div class="form-grid-2 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="form-group flex flex-col gap-1">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Plazo de crédito (días)</label>
              <input formControlName="plazo_credito" type="number" min="0" placeholder="0"
                class="rounded-lg border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-200 placeholder-gray-400 dark:placeholder-slate-500 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 dark:focus:ring-blue-500 transition-colors">
            </div>
          </div>

          <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-gray-200 dark:border-slate-700">
            <button type="button"
              class="btn btn-outline px-4 py-2 rounded-lg border border-gray-300 dark:border-slate-600 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-800 text-sm transition-colors"
              (click)="cancel()">Cancelar</button>
            <button type="submit"
              class="btn btn-primary flex items-center gap-2 px-4 py-2 rounded-lg bg-blue-500 hover:bg-blue-600 disabled:opacity-50 text-white text-sm font-medium transition-colors"
              [disabled]="saving">
              @if (saving) { <span class="spinner-sm"></span> Guardando... }
              @else { <ng-icon name="matSaveOutline" size="16"></ng-icon> {{ isEdit ? 'Actualizar' : 'Guardar' }} }
            </button>
          </div>
        </form>
      }
    </div>
  </div>
</div>
