<!-- proveedores-form.component.html -->
<app-header [headerTitle]="isEdit ? 'Editar Proveedor' : 'Nuevo Proveedor'"
  headerDescription="Registra o actualiza la información del proveedor.">
</app-header>

<div class="p-2 m-2">
  <div class="card max-w-3xl mx-auto">
    <div class="card-header">
      <span class="card-title">{{ isEdit ? 'Editar Proveedor' : 'Datos del Proveedor' }}</span>
      <button class="btn btn-outline btn-sm" (click)="cancel()">
        <ng-icon name="matArrowBackOutline" size="16"></ng-icon> Volver
      </button>
    </div>
    <div class="card-body p-5">
      @if (form) {
        <form [formGroup]="form" (ngSubmit)="save()">

          <h3 class="section-title">Información General</h3>
          <div class="form-grid-2">
            <div class="form-group form-full">
              <label>Nombre comercial *</label>
              <input formControlName="nombre" type="text" placeholder="Nombre del proveedor">
              @if (f['nombre'].invalid && f['nombre'].touched) {
                <span class="error-msg">Nombre es requerido</span>}
            </div>
            <div class="form-group form-full">
              <label>Razón social</label>
              <input formControlName="razon_social" type="text" placeholder="Nombre legal completo">
            </div>
            <div class="form-group">
              <label>NIT</label>
              <input formControlName="nit" type="text" placeholder="0000000-0">
            </div>
            <div class="form-group">
              <label>Categoría de productos</label>
              <select formControlName="categoria">
                <option value="">Seleccionar...</option>
                <option value="Fertilizantes">Fertilizantes</option>
                <option value="Plaguicidas">Plaguicidas</option>
                <option value="Semillas">Semillas</option>
                <option value="Herramientas">Herramientas</option>
                <option value="Equipos">Equipos</option>
                <option value="Veterinaria">Veterinaria</option>
                <option value="Agroquímicos">Agroquímicos</option>
                <option value="General">General</option>
              </select>
            </div>
          </div>

          <h3 class="section-title mt-4">Contacto</h3>
          <div class="form-grid-2">
            <div class="form-group form-full">
              <label>Persona de contacto</label>
              <input formControlName="contacto" type="text" placeholder="Nombre del representante">
            </div>
            <div class="form-group">
              <label>Teléfono</label>
              <input formControlName="telefono" type="tel" placeholder="0000-0000">
            </div>
            <div class="form-group">
              <label>Correo electrónico</label>
              <input formControlName="email" type="email" placeholder="correo@proveedor.com">
            </div>
            <div class="form-group form-full">
              <label>Dirección</label>
              <input formControlName="direccion" type="text" placeholder="Dirección completa">
            </div>
            <div class="form-group">
              <label>Departamento</label>
              <select formControlName="departamento">
                <option value="">Seleccionar...</option>
                @for (d of departamentos; track d) { <option [value]="d">{{ d }}</option> }
              </select>
            </div>
          </div>

          <h3 class="section-title mt-4">Condiciones Comerciales</h3>
          <div class="form-grid-2">
            <div class="form-group">
              <label>Plazo de crédito (días)</label>
              <input formControlName="plazo_credito" type="number" min="0" placeholder="0">
            </div>
          </div>

          <div class="flex justify-end gap-3 mt-6 pt-4 border-t" style="border-color:var(--border)">
            <button type="button" class="btn btn-outline" (click)="cancel()">Cancelar</button>
            <button type="submit" class="btn btn-primary" [disabled]="saving">
              @if (saving) { <span class="spinner-sm"></span> Guardando... }
              @else { <ng-icon name="matSaveOutline" size="16"></ng-icon> {{ isEdit ? 'Actualizar' : 'Guardar' }} }
            </button>
          </div>
        </form>
      }
    </div>
  </div>
</div>
