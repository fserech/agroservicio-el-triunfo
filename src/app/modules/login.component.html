<!-- login.component.html -->
<div class="login-page min-h-screen flex items-center justify-center bg-gray-100 dark:bg-slate-950 transition-colors">
  <div class="login-card w-full max-w-sm mx-4 bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-2xl shadow-lg overflow-hidden">

    <div class="login-header px-8 pt-8 pb-6 text-center">
      <div class="login-logo inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-green-500 dark:bg-green-600 shadow-md mb-4">
        <svg viewBox="0 0 24 24" fill="white" width="26" height="26">
          <path d="M12 2C8 2 4 6 4 10c0 6 8 12 8 12s8-6 8-12c0-4-4-8-8-8zm0 10a2 2 0 110-4 2 2 0 010 4z"/>
        </svg>
      </div>
      <h1 class="login-title text-xl font-bold text-gray-800 dark:text-gray-100">Agroservicio El Triunfo</h1>
      <p class="login-subtitle text-sm text-gray-500 dark:text-gray-400 mt-1">Ingresa tus credenciales para continuar</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="login()" class="login-form px-8 pb-6 space-y-4">

      <div class="form-group flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Usuario</label>
        <input formControlName="username" type="text" placeholder="Ingresa tu usuario"
               autocomplete="username"
               class="rounded-xl border border-gray-300 dark:border-slate-600 bg-gray-50 dark:bg-slate-800 text-gray-800 dark:text-gray-200 placeholder-gray-400 dark:placeholder-slate-500 py-2.5 px-4 w-full text-sm focus:outline-none focus:ring-2 focus:ring-green-400 dark:focus:ring-green-500 focus:border-transparent transition-all">
        <span class="text-xs text-red-500 dark:text-red-400" *ngIf="form.get('username')?.invalid && form.get('username')?.touched">
          Usuario requerido
        </span>
      </div>

      <div class="form-group flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Contraseña</label>
        <div class="relative">
          <input formControlName="password"
                 [type]="showPassword ? 'text' : 'password'"
                 placeholder="••••••••"
                 autocomplete="current-password"
                 class="rounded-xl border border-gray-300 dark:border-slate-600 bg-gray-50 dark:bg-slate-800 text-gray-800 dark:text-gray-200 placeholder-gray-400 dark:placeholder-slate-500 py-2.5 px-4 pr-10 w-full text-sm focus:outline-none focus:ring-2 focus:ring-green-400 dark:focus:ring-green-500 focus:border-transparent transition-all">
          <button type="button"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition-colors"
                  (click)="showPassword = !showPassword">
            <ng-icon [name]="showPassword ? 'matVisibilityOffOutline' : 'matVisibilityOutline'" size="18"></ng-icon>
          </button>
        </div>
        <span class="text-xs text-red-500 dark:text-red-400" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Contraseña requerida
        </span>
      </div>

      @if (errorMsg) {
        <div class="login-error flex items-center gap-2 px-3 py-2.5 rounded-xl bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-700 text-red-600 dark:text-red-400 text-sm">
          <ng-icon name="matErrorOutline" size="16"></ng-icon>
          {{ errorMsg }}
        </div>
      }

      <button type="submit"
              class="btn-primary w-full h-11 mt-1 flex items-center justify-center gap-2 rounded-xl bg-green-500 hover:bg-green-600 disabled:opacity-60 text-white font-bold text-sm transition-colors"
              [disabled]="loading">
        @if (loading) {
          <span class="spinner-sm"></span> Ingresando...
        } @else {
          <ng-icon name="matLoginOutline" size="16"></ng-icon>
          Ingresar
        }
      </button>
    </form>

    <div class="login-footer px-8 pb-6 text-center">
      <p class="text-xs text-gray-400 dark:text-gray-600">Sistema de Gestión v2.1.0</p>
    </div>

  </div>
</div>
