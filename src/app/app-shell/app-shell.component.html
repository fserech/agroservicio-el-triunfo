<!-- app-shell.component.html — Layout estilo Librería Yami -->
<div class="flex h-screen overflow-hidden bg-gray-50 dark:bg-slate-950">

  <!-- SIDEBAR -->
  <app-sidebar></app-sidebar>

  <!-- MAIN CONTENT -->
  <main class="flex flex-col flex-1 overflow-hidden min-w-0">

    <!-- TOPBAR MOBILE -->
    <header class="flex items-center justify-between px-4 h-14 bg-white dark:bg-slate-900
                   border-b dark:border-slate-800 flex-shrink-0 lg:hidden">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-lg flex items-center justify-center"
             style="background: linear-gradient(135deg, #00C793, #009e75);">
          <svg viewBox="0 0 24 24" fill="white" width="14" height="14">
            <path d="M12 2C8 2 4 6 4 10c0 6 8 12 8 12s8-6 8-12c0-4-4-8-8-8zm0 10a2 2 0 110-4 2 2 0 010 4z"/>
          </svg>
        </div>
        <span class="text-sm font-bold text-gray-700 dark:text-white">Agroservicio El Triunfo</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs text-gray-400 dark:text-gray-500">{{ user?.nombre }}</span>
      </div>
    </header>

    <!-- ROUTER OUTLET -->
    <div class="flex-1 overflow-y-auto pb-16 lg:pb-0">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

<!-- TOAST GLOBAL -->
<app-toast></app-toast>
