<!-- app-shell.component.html -->
<div class="app-shell">
  <!-- SIDEBAR -->
  <app-sidebar></app-sidebar>
  <!-- MAIN CONTENT -->
  <main class="app-main">
    <!-- TOP NAVBAR -->
    <header class="topbar">
      <div class="topbar-brand">
        <div class="topbar-logo">
          <svg viewBox="0 0 24 24" fill="white" width="16" height="16">
            <path d="M12 2C8 2 4 6 4 10c0 6 8 12 8 12s8-6 8-12c0-4-4-8-8-8zm0 10a2 2 0 110-4 2 2 0 010 4z"/>
          </svg>
        </div>
        <span class="topbar-name">Agroservicio El Triunfo</span>
      </div>
      <div class="topbar-actions">
        <span class="topbar-user hidden sm:inline">{{ user?.nombre }}</span>
        <!-- TOGGLE TEMA OSCURO/CLARO -->
        <button class="btn-icon" (click)="toggleTheme()"
  [title]="darkMode ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'">
  @if (darkMode) {
    <ng-icon name="matLightModeOutline" size="18"></ng-icon>
  } @else {
    <ng-icon name="matDarkModeOutline" size="18"></ng-icon>
  }
</button>
        <button class="btn-icon" title="Cerrar sesión" (click)="logout()">
          <ng-icon name="matLogoutOutline" size="18"></ng-icon>
        </button>
      </div>
    </header>
    <!-- ROUTER OUTLET -->
    <div class="app-content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
<!-- TOAST GLOBAL -->
<app-toast></app-toast>
