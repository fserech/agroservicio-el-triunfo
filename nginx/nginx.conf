events {
  worker_connections 1024;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile   on;
  tcp_nopush on;
  keepalive_timeout 65;

  # Ocultar versión de nginx
  server_tokens off;

  # ── GZIP ────────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  # ── LÍMITES ─────────────────────────────────────────────────────────────────
  client_max_body_size      2m;
  client_body_timeout       10s;
  client_header_timeout     10s;
  send_timeout              10s;
  keepalive_requests        100;

  # ── LOG FORMAT con IP real ───────────────────────────────────────────────────
  log_format security '$remote_addr [$time_local] "$request" $status '
                      '$body_bytes_sent "$http_referer" "$http_user_agent" '
                      'rt=$request_time';
  access_log /var/log/nginx/access.log security;
  error_log  /var/log/nginx/error.log  warn;

  server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── CABECERAS DE SEGURIDAD HTTP ──────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                        always;
    add_header X-Content-Type-Options    "nosniff"                     always;
    add_header X-XSS-Protection          "1; mode=block"               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';"
      always;
    # Uncomment in production with HTTPS:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── PREVENIR acceso a archivos sensibles ─────────────────────────────────
    location ~ /\.(env|git|htaccess|htpasswd|DS_Store) {
      deny all;
      return 404;
    }
    location ~ \.(sh|sql|conf|yaml|yml|json)$ {
      deny all;
      return 404;
    }

    # ── index.html — nunca cachear ───────────────────────────────────────────
    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header X-Frame-Options        "DENY"    always;
      add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Assets con hash — cache inmutable ───────────────────────────────────
    location ~* \.(js|css)$ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
    }

    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
      add_header Cache-Control "public, max-age=86400";
      try_files $uri =404;
    }

    # ── Angular SPA ──────────────────────────────────────────────────────────
    location / {
      try_files $uri $uri/ /index.html;
    }

    # ── API proxy ────────────────────────────────────────────────────────────
    location /api/ {
      resolver       127.0.0.11 valid=5s;
      set            $backend "http://backend:3000";
      proxy_pass     $backend;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Timeouts de proxy
      proxy_connect_timeout  5s;
      proxy_send_timeout    30s;
      proxy_read_timeout    30s;

      # No exponer headers internos del backend al cliente
      proxy_hide_header X-Powered-By;
      proxy_hide_header Server;
    }
  }
}
